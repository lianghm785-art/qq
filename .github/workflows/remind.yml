name: 睡前提醒

on:
  schedule:
    # 每天 14:00 UTC = 中国时间 22:00
    - cron: '0 14 * * *'
  workflow_dispatch:  # 允许手动触发，方便测试

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行提醒脚本
        run: python remind.py
        env:
          YOUR_QQ: ${{ secrets.YOUR_QQ }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          QMSG_KEY: ${{ secrets.QMSG_KEY }}
